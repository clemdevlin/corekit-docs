<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f12"/>
      <stop offset="100%" style="stop-color:#13161b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#94e2d5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="160" height="160" rx="28"/>
    </clipPath>
  </defs>

  <!-- ── Icon mark (square) ── -->
  <g>
    <!-- Icon background -->
    <rect x="0" y="0" width="160" height="160" rx="28" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="160" height="160" rx="28" fill="none" stroke="#23272f" stroke-width="1.5"/>

    <!-- Subtle grid -->
    <g opacity="0.15" clip-path="url(#iconClip)">
      <line x1="0" y1="40" x2="160" y2="40" stroke="#89b4fa" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="160" y2="80" stroke="#89b4fa" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="160" y2="120" stroke="#89b4fa" stroke-width="0.5"/>
      <line x1="40" y1="0" x2="40" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
      <line x1="80" y1="0" x2="80" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
    </g>

    <!-- Glow blob -->
    <ellipse cx="80" cy="80" rx="50" ry="50" fill="#89b4fa" opacity="0.06" filter="url(#softglow)"/>

    <!-- Hexagonal bracket shape -->
    <!-- Left bracket < -->
    <polyline points="68,46 44,80 68,114" fill="none" stroke="url(#accentGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.95"/>
    <!-- Right bracket > -->
    <polyline points="92,46 116,80 92,114" fill="none" stroke="url(#accentGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.95"/>
    <!-- Slash / in the middle -->
    <line x1="88" y1="52" x2="72" y2="108" stroke="url(#greenGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

    <!-- Corner accents -->
    <rect x="12" y="12" width="8" height="2" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="12" y="12" width="2" height="8" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="140" y="12" width="8" height="2" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="146" y="12" width="2" height="8" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="12" y="146" width="8" height="2" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="12" y="140" width="2" height="8" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="140" y="146" width="8" height="2" rx="1" fill="#89b4fa" opacity="0.4"/>
    <rect x="146" y="140" width="2" height="8" rx="1" fill="#89b4fa" opacity="0.4"/>
  </g>

  <!-- ── Wordmark ── -->
  <g transform="translate(182, 0)">
    <!-- scope label -->
    <text x="2" y="54"
      font-family="'DM Mono', 'Courier New', monospace"
      font-size="13"
      font-weight="400"
      fill="#6b7280"
      letter-spacing="0.5">@clem/</text>

    <!-- corekit -->
    <text x="0" y="108"
      font-family="'DM Mono', 'Courier New', monospace"
      font-size="52"
      font-weight="500"
      letter-spacing="-1.5"
      fill="url(#accentGrad)">corekit</text>

    <!-- tagline -->
    <text x="3" y="136"
      font-family="'DM Mono', 'Courier New', monospace"
      font-size="12"
      fill="#4b5563"
      letter-spacing="0.8">general-purpose utility library</text>

    <!-- decorative underline accent -->
    <rect x="0" y="116" width="290" height="1.5" rx="1" fill="url(#accentGrad)" opacity="0.25"/>
    <!-- small dot accent -->
    <circle cx="297" cy="116.75" r="2.5" fill="#89b4fa" opacity="0.5"/>
  </g>
</svg>
